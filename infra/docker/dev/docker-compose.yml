services:
  session-server:
    build:
      context: ../../../src/server
      dockerfile: ../../infra/docker/server.Dockerfile
      args:
        BUILD_MODE: dev
    container_name: owp-session-server
    ports:
      - "${SESSION_SERVER_PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8096,https://localhost:8096}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-OpenWatchParty}
      - JWT_ISSUER=${JWT_ISSUER:-Jellyfin}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  jellyfin-dev:
    image: jellyfin/jellyfin:10.11.6
    container_name: jellyfin-dev
    environment:
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}
    depends_on:
      - session-server
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ./config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_DIR:-${HOME}/Videos/Movies}:/media/Movies:ro
      - ../../../src/clients/jellyfin-web:/jellyfin/jellyfin-web/plugins/openwatchparty:ro
      - ../../../src/plugins/jellyfin/OpenWatchParty/dist:/config/plugins/OpenWatchParty
      - ./scripts/jellyfin-entrypoint.sh:/jellyfin-entrypoint.sh:ro
    restart: unless-stopped
    entrypoint: /jellyfin-entrypoint.sh

  plugin-builder:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    network_mode: host
    profiles:
      - tools
    volumes:
      - ../../../src/plugins/jellyfin/OpenWatchParty:/src
    environment:
      - HOME=/tmp
      - DOTNET_CLI_HOME=/tmp/.dotnet
    command: dotnet publish -c Release -o /src/dist OpenWatchPartyPlugin.csproj

volumes:
  jellyfin-cache:
